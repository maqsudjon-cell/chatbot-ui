<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot UI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f0f0; }
        #chat-container { max-width: 800px; margin: 20px auto; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); height: 80vh; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 5px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .bot { background: #e9ecef; align-self: flex-start; }
        #input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Xabaringizni yozing...">
            <button onclick="sendMessage()">Yuborish</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.example.com/chat'; // API URL ni o'zgartiring
        const API_KEY = 'YOUR_API_KEY'; // Agar kerak bo'lsa

        function addMessage(text, isUser) {
            const messages = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            msgDiv.textContent = text;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            // API ga so'rov
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // 'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                addMessage(data.reply || 'Javob topilmadi', false);
            } catch (error) {
                addMessage('Xatolik yuz berdi: ' + error.message, false);
            }
        }

        // Enter tugmasi bilan yuborish
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Welcome message
        addMessage('Salom! Men chatbotman. Savolingizni bering.', false);
    </script>
</body>
</html>
